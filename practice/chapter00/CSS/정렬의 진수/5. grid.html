<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>grid</title>
    <style>
      .parent {
        display: grid;
        place-items: center; /* 아이템 정렬 단축 */
        height: 200px;
        background: lightgray;
      }
      .box {
        background: lightpink;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box">가운데</div>
    </div>
  </body>
</html>
