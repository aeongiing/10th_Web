<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>flex</title>
    <style>
      .parent {
        display: flex;
        justify-content: center;
        align-items: center; /* 중앙 정렬 */
        height: 200px;
        background: lightgray;
      }
      .box {
        background: lightcoral;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box">가운데</div>
    </div>
  </body>
</html>
