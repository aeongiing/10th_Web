<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css_mission01</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Apple SD Gothic Neo", sans-serif;
        background-color: #fff;
      }

      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 40px;
        border-bottom: 1px solid #eee;
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 100;
      }

      .navbar__logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 20px;
        font-weight: 700;
        color: #000;
        text-decoration: none;
      }

      .navbar__menu {
        display: flex;
        align-items: center;
        gap: 32px;
        list-style: none;
      }

      .navbar__menu-item a {
        text-decoration: none;
        color: #333;
        font-size: 15px;
        font-weight: 500;
        transition: color 0.2s;
      }

      .navbar__menu-item a:hover {
        color: #6c63ff;
      }

      .navbar__menu-item--active a {
        color: #6c63ff;
        font-weight: 700;
      }

      .navbar__menu-text {
        display: inline;
      }

      .navbar__right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .navbar__lang {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .navbar__lang-btn {
        font-size: 14px;
        color: #999;
        cursor: pointer;
        background: none;
        border: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      .navbar__lang-btn:hover {
        color: #6c63ff;
      }

      .navbar__lang-btn--active {
        color: #6c63ff;
        font-weight: 700;
      }

      .navbar__lang-divider {
        color: #ddd;
        font-size: 14px;
      }

      .navbar__button {
        background-color: #6c63ff;
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .navbar__button:hover {
        background-color: #574fd6;
      }

      @media (max-width: 768px) {
        .navbar {
          padding: 14px 20px;
        }
        .navbar__menu-text {
          display: none;
        }
        .navbar__menu {
          gap: 20px;
        }
        .navbar__menu-item a {
          font-size: 20px;
        }
        .navbar__button {
          padding: 8px 14px;
          font-size: 13px;
        }
      }

      .hero {
        text-align: center;
        padding: 80px 20px;
      }

      .hero__title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 16px;
      }

      .hero__desc {
        font-size: 16px;
        color: #666;
        margin-bottom: 8px;
      }

      .path-indicator {
        margin-top: 20px;
        font-size: 14px;
        color: #999;
      }

      .path-indicator span {
        background: #f3f2ff;
        color: #6c63ff;
        padding: 4px 12px;
        border-radius: 999px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="#" class="navbar__logo">🐱 <span>Aido</span></a>

      <ul class="navbar__menu">
        <li class="navbar__menu-item navbar__menu-item--active">
          <a href="#"
            ><span class="navbar__menu-icon">🐱</span>
            <span
              class="navbar__menu-text"
              data-ko="고양이 친구들"
              data-en="Cat Friends"
              >고양이 친구들</span
            ></a
          >
        </li>
        <li class="navbar__menu-item">
          <a href="#"
            ><span class="navbar__menu-icon">📋</span>
            <span
              class="navbar__menu-text"
              data-ko="패치 노트"
              data-en="Patch Notes"
              >패치 노트</span
            ></a
          >
        </li>
        <li class="navbar__menu-item">
          <a href="#"
            ><span class="navbar__menu-icon">📱</span>
            <span
              class="navbar__menu-text"
              data-ko="앱 다운로드"
              data-en="Download App"
              >앱 다운로드</span
            ></a
          >
        </li>
      </ul>

      <div class="navbar__right">
        <div class="navbar__lang">
          <button class="navbar__lang-btn" id="btn-ko" onclick="setLang('ko')">
            KO
          </button>
          <span class="navbar__lang-divider">|</span>
          <button class="navbar__lang-btn" id="btn-en" onclick="setLang('en')">
            EN
          </button>
        </div>
        <button
          class="navbar__button"
          data-ko="출시 알림 받기"
          data-en="Get Notified"
        >
          출시 알림 받기
        </button>
      </div>
    </nav>

    <div class="hero">
      <h1
        class="hero__title"
        data-ko="작심삼일은 이제 그만,<br>친구와 함께 매일 성취하세요"
        data-en="Stop giving up in 3 days,<br>Achieve every day with friends"
      >
        작심삼일은 이제 그만,<br />친구와 함께 매일 성취하세요
      </h1>
      <p
        class="hero__desc"
        data-ko="고양이 친구들이 매일 응원해줄 거예요 🐱"
        data-en="Your cat friends will cheer you on every day 🐱"
      >
        고양이 친구들이 매일 응원해줄 거예요 🐱
      </p>
      <p class="path-indicator">
        현재 경로: <span id="current-path">/ko</span>
      </p>
    </div>

    <script>
      function setLang(lang) {
        // 언어 버튼 활성화
        document
          .getElementById("btn-ko")
          .classList.remove("navbar__lang-btn--active");
        document
          .getElementById("btn-en")
          .classList.remove("navbar__lang-btn--active");
        document
          .getElementById("btn-" + lang)
          .classList.add("navbar__lang-btn--active");

        // 경로 표시
        document.getElementById("current-path").textContent = "/" + lang;

        // data-ko / data-en 속성 가진 모든 요소 텍스트 변경
        document.querySelectorAll("[data-ko][data-en]").forEach(function (el) {
          el.innerHTML = el.getAttribute("data-" + lang);
        });
      }

      window.onload = function () {
        setLang("ko");
      };
    </script>
  </body>
</html>
