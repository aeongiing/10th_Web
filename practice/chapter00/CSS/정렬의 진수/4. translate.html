<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>translate</title>
    <style>
      .parent {
        position: relative;
        height: 200px;
        background: lightgray;
      }
      .box {
        position: absolute;
        top: 50%;
        left: 50%; /*요소의 왼쪽 위 꼭짓점이 부모의 중앙*/
        transform: translate(
          -50%,
          -50%
        ); /*자기 크기의 절반만큼 다시 이동(=>진짜 중앙 맞춰짐)*/
        background: lightgreen;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box">가운데</div>
    </div>
  </body>
</html>
